# ==============================================================================
# Deploy Production — Antigravity Jukebox
# ==============================================================================
# Trigger: merge into main (only after CI passes)
# Purpose: deploy to production and create GitHub Release with changelog
# ==============================================================================

name: Deploy Production

on:
  push:
    branches: [main]

# Only one production deploy at a time — never cancel in progress
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  checks: read
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # Gate: Wait for CI to pass first
  # ============================================================================
  ci-check:
    name: ✅ Verify CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-name: '🏗️ Build'
          wait-interval: 10
          allowed-conclusions: success

  # ============================================================================
  # Job 1: Deploy Frontend to Vercel (Production)
  # Let Vercel handle the build — env vars set in Vercel Dashboard
  # ============================================================================
  deploy-frontend:
    name: 🚀 Deploy FE → Vercel Production
    runs-on: ubuntu-latest
    needs: ci-check
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel project
        run: vercel link --yes --project=${{ secrets.VERCEL_PROJECT_ID }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Deploy to Vercel Production
        run: |
          URL=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "### 🌐 Frontend Production: $URL" >> "$GITHUB_STEP_SUMMARY"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

  # ============================================================================
  # Job 2: Deploy Backend to Render (Production)
  # ============================================================================
  deploy-backend:
    name: 🚀 Deploy API → Render Production
    runs-on: ubuntu-latest
    needs: ci-check
    steps:
      - name: Deploy to Render Production
        run: |
          if [ -z "$RENDER_SERVICE_ID" ]; then
            echo "### ⏭️ Render Production skipped — RENDER_PROD_SERVICE_ID not set" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "clear"}')
          
          if [ "$RESPONSE" = "201" ]; then
            echo "### ✅ Backend deployed to Render Production" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ Backend deploy failed (HTTP $RESPONSE)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_PROD_SERVICE_ID }}

  # ============================================================================
  # Job 3: Create GitHub Release
  # ============================================================================
  release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          TAG="v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --no-merges -20)
          else
            COMMITS=$(git log "$LAST_TAG"..HEAD --oneline --no-merges)
          fi
          
          {
            echo "## What's Changed"
            echo ""
            echo "$COMMITS" | while IFS= read -r line; do
              echo "- $line"
            done
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG:-main}...${{ steps.version.outputs.tag }}"
          } > /tmp/changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: /tmp/changelog.md
          generate_release_notes: true
