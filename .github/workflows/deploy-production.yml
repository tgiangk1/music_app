# ==============================================================================
# Deploy Production — Antigravity Jukebox
# ==============================================================================
# Trigger: merge into main (only after CI passes)
# Purpose: deploy to production and create GitHub Release with changelog
# ==============================================================================

name: Deploy Production

on:
  push:
    branches: [main]

# Only one production deploy at a time — never cancel in progress
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # Gate: Wait for CI to pass first
  # ============================================================================
  ci-check:
    name: "\u2705 Verify CI"
    runs-on: ubuntu-latest
    steps:
      # Ensure CI workflow completed successfully for this commit
      - name: Wait for CI
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-name: "\U0001F3D7\uFE0F Build"
          wait-interval: 10
          allowed-conclusions: success

  # ============================================================================
  # Job 1: Deploy Frontend to Vercel (Production)
  # ============================================================================
  deploy-frontend:
    name: "\U0001F680 Deploy FE \u2192 Vercel Production"
    runs-on: ubuntu-latest
    needs: ci-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Pull production environment config from Vercel
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: packages/fe
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Build for production
      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: packages/fe
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Deploy to production (--prod flag)
      - name: Deploy to Vercel Production
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "### \U0001F310 Frontend Production: $URL" >> "$GITHUB_STEP_SUMMARY"
        working-directory: packages/fe
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ============================================================================
  # Job 2: Deploy Backend to Render (Production)
  # ============================================================================
  deploy-backend:
    name: "\U0001F680 Deploy API \u2192 Render Production"
    runs-on: ubuntu-latest
    needs: ci-check
    steps:
      # Trigger Render production deploy
      - name: Deploy to Render Production
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "clear"}')
          
          if [ "$RESPONSE" = "201" ]; then
            echo "### \u2705 Backend deployed to Render Production" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### \u274C Backend deploy failed (HTTP $RESPONSE)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  # ============================================================================
  # Job 3: Create GitHub Release with auto-generated changelog
  # ============================================================================
  release:
    name: "\U0001F4E6 Create Release"
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: success()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for changelog

      # Generate tag from date + short SHA (e.g., v2026.03.12-abc1234)
      - name: Generate version tag
        id: version
        run: |
          TAG="v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Generated tag: $TAG"

      # Generate changelog from commits since last tag
      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --no-merges -20)
          else
            COMMITS=$(git log "$LAST_TAG"..HEAD --oneline --no-merges)
          fi
          
          # Write changelog to file (handles multi-line output)
          {
            echo "## What's Changed"
            echo ""
            echo "$COMMITS" | while IFS= read -r line; do
              echo "- $line"
            done
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG:-main}...${{ steps.version.outputs.tag }}"
          } > /tmp/changelog.md
          
          cat /tmp/changelog.md

      # Create GitHub Release with the generated changelog
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: /tmp/changelog.md
          generate_release_notes: true
