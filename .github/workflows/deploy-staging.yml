# ==============================================================================
# Deploy Staging — Antigravity Jukebox
# ==============================================================================
# Trigger: merge into develop branch
# Purpose: deploy preview/staging builds for QA before production
# ==============================================================================

name: Deploy Staging

on:
  push:
    branches: [develop]

# Only one staging deploy at a time
concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # Job 1: Deploy Frontend to Vercel (Preview)
  # Let Vercel handle the build — env vars set in Vercel Dashboard
  # ============================================================================
  deploy-frontend:
    name: 🚀 Deploy FE → Vercel Preview
    runs-on: ubuntu-latest
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel project
        run: vercel link --yes --project=${{ secrets.VERCEL_PROJECT_ID }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Deploy to Vercel Preview
        id: deploy
        run: |
          URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$URL" >> "$GITHUB_OUTPUT"
          echo "### 🌐 Frontend Preview: $URL" >> "$GITHUB_STEP_SUMMARY"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

  # ============================================================================
  # Job 2: Deploy Backend to Render (Staging)
  # ============================================================================
  deploy-backend:
    name: 🚀 Deploy API → Render Staging
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render Staging
        run: |
          if [ -z "$RENDER_SERVICE_ID" ]; then
            echo "### ⏭️ Render Staging skipped — RENDER_STAGING_SERVICE_ID not set" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')
          
          if [ "$RESPONSE" = "201" ]; then
            echo "### ✅ Backend deploy triggered on Render Staging" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ Backend deploy failed (HTTP $RESPONSE)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_STAGING_SERVICE_ID }}

  # ============================================================================
  # Job 3: Comment staging URLs
  # ============================================================================
  comment-urls:
    name: 💬 Comment Staging URLs
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    if: success()
    steps:
      - name: Find related PR
        id: find-pr
        uses: jwalton/gh-find-current-pr@v1
        with:
          state: all

      - name: Comment on PR
        if: steps.find-pr.outputs.pr
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ needs.deploy-frontend.outputs.preview-url }}';
            const body = [
              '## 🚀 Staging Deployment',
              '',
              `| Service | URL | Status |`,
              `|---------|-----|--------|`,
              `| **Frontend** | ${previewUrl} | ✅ Deployed |`,
              `| **Backend** | Render Staging | ✅ Triggered |`,
              '',
              `> Deployed from \`${context.sha.substring(0, 7)}\``,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.find-pr.outputs.pr }},
              body,
            });
