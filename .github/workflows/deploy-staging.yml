# ==============================================================================
# Deploy Staging — Antigravity Jukebox
# ==============================================================================
# Trigger: merge into develop branch
# Purpose: deploy preview/staging builds for QA before production
# ==============================================================================

name: Deploy Staging

on:
  push:
    branches: [develop]

# Only one staging deploy at a time
concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # Job 1: Deploy Frontend to Vercel (Preview Environment)
  # ============================================================================
  deploy-frontend:
    name: "\U0001F680 Deploy FE \u2192 Vercel Preview"
    runs-on: ubuntu-latest
    outputs:
      preview-url: ${{ steps.vercel-deploy.outputs.preview-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Install Vercel CLI globally
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Pull Vercel project settings (links local to Vercel project)
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: packages/fe
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Build using Vercel's build pipeline
      - name: Build with Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: packages/fe
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Deploy to Vercel preview (not production)
      - name: Deploy to Vercel Preview
        id: vercel-deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$URL" >> "$GITHUB_OUTPUT"
          echo "### \U0001F310 Frontend Preview: $URL" >> "$GITHUB_STEP_SUMMARY"
        working-directory: packages/fe
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ============================================================================
  # Job 2: Deploy Backend to Render (Staging Service)
  # ============================================================================
  deploy-backend:
    name: "\U0001F680 Deploy API \u2192 Render Staging"
    runs-on: ubuntu-latest
    outputs:
      deploy-status: ${{ steps.render-deploy.outputs.status }}
    steps:
      # Trigger Render deploy via Deploy Hook API
      - name: Deploy to Render Staging
        id: render-deploy
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')
          
          echo "status=$RESPONSE" >> "$GITHUB_OUTPUT"
          
          if [ "$RESPONSE" = "201" ]; then
            echo "### \u2705 Backend deploy triggered on Render Staging" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### \u274C Backend deploy failed (HTTP $RESPONSE)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  # ============================================================================
  # Job 3: Comment staging URLs on the merge commit
  # ============================================================================
  comment-urls:
    name: "\U0001F4AC Comment Staging URLs"
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: success()
    steps:
      - name: Find related PR
        id: find-pr
        uses: jwalton/gh-find-current-pr@v1
        with:
          state: all

      # Post staging links as PR comment (if PR exists)
      - name: Comment on PR
        if: steps.find-pr.outputs.pr
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ needs.deploy-frontend.outputs.preview-url }}';
            const body = [
              '## \U0001F680 Staging Deployment',
              '',
              '| Service | URL | Status |',
              '|---------|-----|--------|',
              `| **Frontend** | ${previewUrl} | \u2705 Deployed |`,
              '| **Backend** | Render Staging | \u2705 Triggered |',
              '',
              `> Deployed from \`${context.sha.substring(0, 7)}\` at ${new Date().toISOString()}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.find-pr.outputs.pr }},
              body,
            });
